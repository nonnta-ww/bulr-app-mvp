<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>bulr business - 新規面接セッション作成</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1c1b1d",
                        "on-primary-fixed": "#161a2f",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#d9e2fb",
                        "outline": "#77767d",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c1c5e0",
                        "tertiary": "#000000",
                        "on-tertiary-fixed-variant": "#564425",
                        "background": "#fcf8fa",
                        "primary-container": "#161a2f",
                        "on-secondary-fixed": "#121b2d",
                        "inverse-surface": "#313032",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f3f0f2",
                        "surface-variant": "#e5e2e4",
                        "primary-fixed-dim": "#c1c5e0",
                        "on-background": "#1c1b1d",
                        "primary-fixed": "#dde1fd",
                        "primary": "#000000",
                        "tertiary-container": "#271901",
                        "secondary-fixed-dim": "#bdc6de",
                        "surface-container-high": "#eae7e9",
                        "surface": "#fcf8fa",
                        "on-primary-container": "#7e839c",
                        "surface-dim": "#dcd9db",
                        "tertiary-fixed": "#fadfb5",
                        "on-surface-variant": "#46464d",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#41465c",
                        "outline-variant": "#c7c5cd",
                        "on-secondary-container": "#5b6479",
                        "tertiary-fixed-dim": "#ddc39b",
                        "surface-container-low": "#f6f3f5",
                        "error-container": "#ffdad6",
                        "surface-tint": "#595d75",
                        "surface-container-highest": "#e5e2e4",
                        "secondary-container": "#d9e2fb",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fcf8fa",
                        "on-tertiary-fixed": "#271901",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#555e73",
                        "on-secondary-fixed-variant": "#3e475b",
                        "surface-container": "#f0edef",
                        "on-tertiary-container": "#97815d",
                        "on-tertiary": "#ffffff",
                        // Custom Brand Colors based on prompt
                        "brand-navy": "#11162A",
                        "brand-copper": "#C9803B",
                        "brand-bg": "#F7F8FA",
                        "brand-border": "#E6E9F0",
                        "brand-surface": "#FFFFFF",
                        "brand-secondary": "#5A6378",
                        "brand-muted": "#9AA1B2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "container-max": "1280px",
                        "unit": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "headline-md": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "display-lg": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "headline-sm": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "headline-lg": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "body-md": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "body-lg": ["Noto Sans JP", "Noto Sans", "sans-serif"],
                        "headline-lg-mobile": ["Noto Sans JP", "Noto Sans", "sans-serif"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #F7F8FA; color: #11162A; }
        .input-focus-ring:focus { outline: none; border-color: #C9803B; box-shadow: none; }
        .custom-checkbox:checked { background-color: #C9803B; border-color: #C9803B; }
        .custom-checkbox:focus { --tw-ring-color: #C9803B; }
    </style>
</head>
<body class="flex h-screen overflow-hidden antialiased text-brand-navy bg-brand-bg">
<!-- SideNavBar -->
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 border-r border-brand-border bg-brand-surface p-6 space-y-4">
<div class="mb-8">
<h1 class="font-headline-md text-headline-md font-bold text-brand-navy flex items-center gap-3">
<span class="material-symbols-outlined" data-icon="business_center" style="font-variation-settings: 'FILL' 1;">business_center</span>
                bulr business
            </h1>
</div>
<nav class="flex-1 space-y-2">
<!-- Active Tab -->
<a class="flex items-center gap-3 px-4 py-3 text-brand-surface bg-brand-navy rounded-lg font-bold transition-all active:scale-[0.98] duration-150 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="video_chat">video_chat</span>
<span class="font-body-md text-body-md">面接セッション</span>
</a>
<!-- Inactive Tabs -->
<a class="flex items-center gap-3 px-4 py-3 text-brand-secondary hover:bg-brand-bg rounded-lg transition-colors active:scale-[0.98] duration-150 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="work">work</span>
<span class="font-body-md text-body-md">募集</span>
</a>
<a class="flex items-center gap-3 px-4 py-3 text-brand-secondary hover:bg-brand-bg rounded-lg transition-colors active:scale-[0.98] duration-150 ease-in-out" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-body-md text-body-md">設定</span>
</a>
</nav>
<div class="mt-auto pt-6 border-t border-brand-border space-y-2">
<div class="flex items-center gap-3 px-4 py-2 text-brand-secondary">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-body-md text-body-md truncate">user@example.com</span>
</div>
<button class="w-full flex items-center gap-3 px-4 py-2 text-brand-secondary hover:text-brand-navy transition-colors text-left">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="font-body-md text-body-md">Logout</span>
</button>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 ml-0 md:ml-64 flex flex-col h-screen overflow-y-auto bg-brand-bg">
<!-- Minimal Top Bar (Mobile fallback + Breadcrumb area) -->
<header class="sticky top-0 z-10 flex items-center px-6 md:px-10 py-6 bg-brand-bg/80 backdrop-blur-sm">
<div class="flex items-center text-brand-secondary font-label-md text-label-md gap-2">
<a class="hover:text-brand-navy transition-colors" href="#">面接セッション</a>
<span class="material-symbols-outlined text-[16px]" data-icon="chevron_right">chevron_right</span>
<span class="text-brand-navy font-bold">新規作成</span>
</div>
</header>
<!-- Content Canvas -->
<div class="flex-1 px-6 md:px-10 pb-12 w-full max-w-container-max mx-auto flex flex-col items-center">
<!-- Muted Note -->
<div class="w-full max-w-[640px] mb-6 flex items-start gap-2 text-brand-secondary text-sm">
<span class="material-symbols-outlined text-[18px] text-brand-copper shrink-0 mt-0.5" data-icon="info">info</span>
<p class="font-body-md text-body-md">通常はエントリーからセッションを作成します。この画面は招待動線を使わないイレギュラーな面接向けです。</p>
</div>
<!-- Form Card -->
<div class="w-full max-w-[640px] bg-brand-surface border border-brand-border rounded-lg p-8 md:p-10">
<h2 class="font-headline-sm text-headline-sm font-bold text-brand-navy mb-8">新規面接セッション作成</h2>
<form class="space-y-6">
<!-- 候補者名 -->
<div>
<label class="block font-label-md text-label-md text-brand-navy mb-2" for="candidate_name">候補者名 <span class="text-error">*</span></label>
<input class="w-full px-4 py-3 border border-brand-border rounded-lg font-body-md text-body-md text-brand-navy placeholder:text-brand-muted input-focus-ring bg-brand-surface transition-colors" id="candidate_name" name="candidate_name" placeholder="例：佐藤 健太" required="" type="text"/>
</div>
<!-- 応募職種 -->
<div>
<label class="block font-label-md text-label-md text-brand-navy mb-2" for="job_title">応募職種 <span class="text-error">*</span></label>
<input class="w-full px-4 py-3 border border-brand-border rounded-lg font-body-md text-body-md text-brand-navy placeholder:text-brand-muted input-focus-ring bg-brand-surface transition-colors" id="job_title" name="job_title" placeholder="例：バックエンドエンジニア" required="" type="text"/>
</div>
<!-- 経歴サマリー -->
<div>
<label class="block font-label-md text-label-md text-brand-navy mb-2" for="experience_summary">経歴サマリー</label>
<textarea class="w-full px-4 py-3 border border-brand-border rounded-lg font-body-md text-body-md text-brand-navy placeholder:text-brand-muted input-focus-ring bg-brand-surface transition-colors resize-y" id="experience_summary" name="experience_summary" rows="4"></textarea>
<p class="mt-2 font-label-md text-label-md text-brand-muted">面接の文脈になる経歴を簡潔に。bulr が優先パターンの選定に使います。</p>
</div>
<!-- メールアドレス -->
<div>
<label class="block font-label-md text-label-md text-brand-navy mb-2" for="email">メールアドレス（任意）</label>
<input class="w-full px-4 py-3 border border-brand-border rounded-lg font-body-md text-body-md text-brand-navy placeholder:text-brand-muted input-focus-ring bg-brand-surface transition-colors" id="email" name="email" placeholder="例：candidate@example.com" type="email"/>
</div>
<div class="pt-4 border-t border-brand-border"></div>
<!-- Consent Checkbox -->
<div class="flex items-start gap-3 bg-brand-bg p-4 rounded-lg border border-brand-border">
<div class="flex items-center h-5 mt-0.5">
<input class="custom-checkbox w-5 h-5 border-brand-border rounded text-brand-copper focus:ring-brand-copper focus:ring-offset-0 bg-brand-surface cursor-pointer" id="consent" name="consent" type="checkbox"/>
</div>
<div class="flex flex-col">
<label class="font-body-md text-body-md font-medium text-brand-navy cursor-pointer" for="consent">
                                候補者から録音・分析の同意を取得済み
                            </label>
<p class="font-label-md text-label-md text-brand-muted mt-1">
                                同意が取れていない場合はセッションを作成しないでください。
                            </p>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-end gap-4 pt-6">
<button class="px-6 py-2.5 font-label-md text-label-md text-brand-secondary hover:text-brand-navy transition-colors bg-transparent border border-transparent hover:bg-brand-bg rounded-lg" type="button">
                            キャンセル
                        </button>
<button class="px-6 py-2.5 font-label-md text-label-md font-medium text-brand-surface bg-brand-navy hover:bg-brand-navy/90 rounded-lg transition-colors shadow-sm" type="submit">
                            セッションを作成
                        </button>
</div>
</form>
</div>
</div>
</main>
</body></html>
