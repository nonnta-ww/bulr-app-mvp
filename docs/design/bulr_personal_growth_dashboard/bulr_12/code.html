<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>プロフィール設定</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#b1d1fe",
                        "inverse-primary": "#ffb77b",
                        "on-secondary-fixed": "#001c37",
                        "secondary": "#406087",
                        "primary-container": "#f28705",
                        "surface-container-highest": "#d4e3ff",
                        "on-primary-fixed": "#2e1500",
                        "surface-tint": "#8f4d00",
                        "on-secondary-fixed-variant": "#27486e",
                        "background": "#f8f9ff",
                        "tertiary": "#b12e00",
                        "on-surface-variant": "#564335",
                        "surface-dim": "#c9dbf9",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#a8c9f5",
                        "secondary-fixed": "#d2e4ff",
                        "on-secondary-container": "#395a80",
                        "primary-fixed-dim": "#ffb77b",
                        "surface-container-high": "#dde9ff",
                        "outline": "#897362",
                        "on-tertiary-container": "#6e1900",
                        "error": "#ba1a1a",
                        "surface-variant": "#d4e3ff",
                        "on-tertiary-fixed": "#3b0900",
                        "primary-fixed": "#ffdcc2",
                        "on-tertiary-fixed-variant": "#872100",
                        "tertiary-container": "#ff7b55",
                        "primary": "#8f4d00",
                        "on-primary-container": "#592e00",
                        "inverse-surface": "#203149",
                        "inverse-on-surface": "#ebf1ff",
                        "tertiary-fixed-dim": "#ffb5a0",
                        "surface-container": "#e6eeff",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#091c33",
                        "surface-container-low": "#eff3ff",
                        "on-primary-fixed-variant": "#6d3a00",
                        "on-background": "#091c33",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#ffdbd1",
                        "outline-variant": "#dcc2af",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f8f9ff",
                        "on-secondary": "#ffffff",
                        "surface": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "40px",
                        "sm": "16px",
                        "xl": "64px",
                        "md": "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "base": "4px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Noto Sans JP"],
                        "headline-lg-mobile": ["Noto Sans JP"],
                        "title-lg": ["Noto Sans JP"],
                        "headline-md": ["Noto Sans JP"],
                        "label-md": ["Noto Sans JP"],
                        "body-md": ["Noto Sans JP"],
                        "headline-lg": ["Noto Sans JP"],
                        "display-lg": ["Noto Sans JP"],
                        "caption": ["Noto Sans JP"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.7", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "title-lg": ["20px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.7", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "display-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "1.4", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .custom-shadow {
            box-shadow: 0px 4px 20px rgba(23, 41, 64, 0.05);
        }
        .input-focus-ring:focus {
            border-color: #7595BF;
            box-shadow: 0 0 0 2px rgba(242, 187, 167, 0.3);
            outline: none;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-on-surface">
<main class="w-full max-w-[400px]">
<div class="bg-surface-container-lowest border border-outline-variant/30 rounded-[10px] custom-shadow p-md md:p-lg flex flex-col gap-md">
<header class="flex flex-col items-center gap-sm text-center">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center text-primary-container mb-xs">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">waving_hand</span>
</div>
<h1 class="font-headline-md text-headline-md hidden md:block">はじめまして！<br/>表示名を教えてください</h1>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:hidden">はじめまして！<br/>表示名を教えてください</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    後からいつでも変更できます。
                </p>
</header>
<form class="flex flex-col gap-md mt-sm" onsubmit="event.preventDefault(); window.location.href='/dashboard';">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="displayName">表示名</label>
<input class="w-full h-12 px-sm py-xs bg-surface-container-lowest border border-outline-variant/50 rounded-lg text-on-surface font-body-md text-body-md input-focus-ring transition-all duration-200" id="displayName" name="displayName" placeholder="山田 太郎" required="" type="text"/>
</div>
<button class="w-full h-14 mt-xs bg-primary-container text-on-secondary-fixed font-title-lg text-title-lg rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-xs" type="submit">
                    はじめる
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
</div>
</main>
</body></html>
