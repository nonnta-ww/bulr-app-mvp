<!DOCTYPE html>

<html lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>サインイン - bulr</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "surface": "#f8f9ff",

                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb77b",
                        "primary-fixed": "#ffdcc2",
                        "on-primary-fixed": "#2e1500",
                        "tertiary-container": "#ff7b55",
                        "tertiary": "#b12e00",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#001c37",
                        "on-primary-fixed-variant": "#6d3a00",
                        "surface-tint": "#8f4d00",
                        "on-background": "#091c33",
                        "on-error": "#ffffff",

                        "brand-bg": "#F5F8FC",

                        "brand-border": "#DCE3EC",
                        "brand-border-focus": "#7595BF",

                    "borderRadius": {

<style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #F5F8FC;
            color: #172940;
        }
        
        .custom-input:focus {
            border-color: #7595BF;
            outline: none;
            box-shadow: 0 0 0 2px rgba(242, 187, 167, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-sm md:p-md relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(#DCE3EC 1px, transparent 1px); background-size: 24px 24px;"></div>
<div class="w-full max-w-[900px] flex flex-col md:flex-row gap-lg items-center justify-center relative z-10">
<!-- Sign In Card -->
<div class="w-full max-w-[400px] bg-brand-surface rounded-card border border-brand-border shadow-ambient p-md flex flex-col items-center">
<!-- Logo -->
<div class="mb-md">
<h1 class="text-headline-lg font-headline-lg text-brand-text-dark tracking-tight">bulr</h1>
</div>
<!-- Heading -->
<h2 class="text-headline-md font-headline-md text-brand-text-dark mb-md w-full text-center">サインイン</h2>
<!-- Form -->
<form class="w-full flex flex-col gap-sm" onsubmit="event.preventDefault(); document.getElementById('success-card').classList.remove('opacity-50', 'scale-95'); document.getElementById('success-card').classList.add('opacity-100', 'scale-100');">
<div class="flex flex-col gap-base">
<label class="text-label-md font-label-md text-brand-text-dark text-left" for="email">メールアドレス</label>
<input class="w-full h-12 px-xs border border-brand-border rounded-input custom-input text-body-md font-body-md bg-brand-surface text-brand-text-dark placeholder:text-brand-text-muted transition-all duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
<button class="w-full h-12 bg-brand-primary hover:bg-brand-primary-hover text-brand-text-dark text-body-md font-bold rounded-lg transition-colors duration-200 mt-xs flex items-center justify-center" type="submit">
                    ログインリンクを送信
                </button>
<p class="text-caption font-caption text-brand-text-muted text-center mt-base">
                    リンクの有効期限は15分です
                </p>
</form>
</div>
<!-- Success Message Card (Visualization) -->
<div class="w-full max-w-[400px] bg-brand-surface rounded-card border border-brand-border shadow-ambient p-md flex flex-col items-center text-center transition-all duration-500 ease-in-out opacity-50 scale-95 hover:opacity-100 hover:scale-100 cursor-default" id="success-card">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-sm text-secondary">
<span class="material-symbols-outlined text-[32px]">mail</span>
</div>
<h3 class="text-title-lg font-title-lg text-brand-text-dark mb-xs">メールを確認してください</h3>
<p class="text-body-md font-body-md text-brand-text-dark leading-relaxed">
                ログイン用のリンクをメールで送信しました。<br/>
                メール内のボタンをクリックして<br/>ログインを完了してください。
            </p>
<button class="mt-md px-sm py-xs border border-brand-border rounded-lg text-label-md font-label-md text-brand-text-muted hover:bg-surface-container transition-colors duration-200" onclick="document.getElementById('success-card').classList.add('opacity-50', 'scale-95'); document.getElementById('success-card').classList.remove('opacity-100', 'scale-100');">
                戻る
            </button>
</div>
</div>
</body></html>
