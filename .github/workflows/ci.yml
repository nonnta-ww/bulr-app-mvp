name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm version は package.json の packageManager フィールド (pnpm@10.33.2) を権威ソースとする。
        # action-setup@v4 は両方指定を ERR_PNPM_BAD_PM_VERSION で拒否する。
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate
