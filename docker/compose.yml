services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bulr
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bulr_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulr"]
      interval: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-small}      # tiny | base | small | medium | large-v3
      ASR_ENGINE: faster_whisper              # CTranslate2-based、CPU で高速
    ports:
      - "9000:9000"
    volumes:
      - whisper_models:/root/.cache           # モデルキャッシュ永続化
    restart: unless-stopped

volumes:
  postgres_data:
  whisper_models:
