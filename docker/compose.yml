services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bulr
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bulr_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulr"]
      interval: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
